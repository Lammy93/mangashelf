<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;--accent:#e8403a;--accent2:#ff7a35;--text:#eeeef0;--muted:#7a7a8c;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  
  .nav-links{display:flex;gap:1.5rem;align-items:center;}.nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:color .2s;}.nav-links a:hover{color:var(--text);}
  .nav-user{display:flex;align-items:center;gap:.75rem;}
  .user-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.3rem .75rem;font-size:.8rem;font-weight:600;}
  .user-badge.admin{border-color:var(--accent);color:var(--accent);}
  .btn{padding:.5rem 1rem;border-radius:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#c93530;}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

  /* HERO */
  .hero{display:flex;gap:2rem;padding:2rem;flex-wrap:wrap;}
  .hero-cover{width:200px;flex-shrink:0;aspect-ratio:2/3;border-radius:12px;overflow:hidden;background:var(--surface2);position:relative;}
  .hero-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .hero-cover .no-cover{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;color:var(--border);}
  .hero-info{flex:1;min-width:240px;}
  .hero-title{font-family:'Dela Gothic One',sans-serif;font-size:1.8rem;line-height:1.2;margin-bottom:.5rem;}
  .hero-meta{color:var(--muted);font-size:.875rem;margin-bottom:1rem;display:flex;gap:1rem;flex-wrap:wrap;}
  .hero-desc{font-size:.875rem;color:var(--muted);line-height:1.6;margin-bottom:1.25rem;max-width:600px;}
  .hero-actions{display:flex;gap:.75rem;flex-wrap:wrap;}
  .badge{display:inline-block;padding:.2rem .5rem;border-radius:5px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .badge-status{background:rgba(255,122,53,.12);color:var(--accent2);}
  .badge-vol{background:rgba(232,64,58,.12);color:var(--accent);}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2rem;margin-top:.5rem;}
  .tab{padding:.75rem 1.25rem;font-size:.875rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);}
  .tab-content{padding:2rem;display:none;}
  .tab-content.active{display:block;}

  /* VOLUMES */
  .vol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .vol-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s;}
  .vol-card:hover{border-color:var(--accent);}
  .vol-card.active-vol{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,64,58,.2);}
  .vol-cover{aspect-ratio:2/3;background:var(--surface2);overflow:hidden;}
  .vol-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .vol-info{padding:.6rem;}
  .vol-title{font-size:.78rem;font-weight:600;}
  .vol-meta{font-size:.7rem;color:var(--muted);}

  /* CHAPTERS */
  .chapter-list{display:flex;flex-direction:column;gap:.4rem;}
  .chapter-item{display:flex;align-items:center;justify-content:space-between;padding:.65rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .2s;text-decoration:none;color:inherit;}
  .chapter-item:hover{border-color:var(--accent);}
  .chapter-item.is-read{opacity:.5;}
  .ch-left{display:flex;align-items:center;gap:.75rem;}
  .ch-num{font-size:.85rem;font-weight:700;min-width:60px;}
  .ch-title{font-size:.82rem;color:var(--muted);}
  .ch-right{display:flex;align-items:center;gap:.5rem;}
  .ch-pages{font-size:.72rem;color:var(--muted);}
  .ch-read-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .scrape-cover-btn{padding:.3rem .6rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.72rem;cursor:pointer;font-family:inherit;transition:all .2s;}
  .scrape-cover-btn:hover{border-color:var(--accent2);color:var(--accent2);}
</style>
</head>
<body>
<nav>
  <a href="/" style="display:flex;align-items:center;text-decoration:none;"><img src="/static/img/logo.png" alt="MangaShelf" style="height:42px;width:42px;object-fit:cover;border-radius:8px;"></a>
  <div class="nav-links">
    <a href="/">← Library</a>
    <a href="/search">Discover</a>
    <a href="/sources">Sources</a>
    {% if user.role == 'admin' %}<a href="/admin">Admin</a>{% endif %}
  </div>
  <div class="nav-user">
    <span class="user-badge {% if user.role == 'admin' %}admin{% endif %}">{{ user.username }}</span>
    <a href="/logout" class="btn btn-ghost">Sign out</a>
  </div>
</nav>

<div id="hero-wrap"></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('volumes')">Volumes</div>
  <div class="tab" onclick="switchTab('chapters')">All Chapters</div>
</div>

<div class="tab-content active" id="tab-volumes">
  <div class="vol-grid" id="vol-grid"></div>
  <div class="chapter-list" id="vol-chapters"></div>
</div>
<div class="tab-content" id="tab-chapters">
  <div class="chapter-list" id="all-chapters"></div>
</div>

<script>
const MANGA_ID = "{{ manga_id }}";
let data = null;
let activeVol = null;

async function load() {
  const res = await fetch(`/api/manga/${MANGA_ID}`);
  data = await res.json();
  renderHero();
  renderVolumes();
  renderAllChapters();

  // Auto-select first volume
  if (data.volumes.length) {
    selectVolume(data.volumes[0].id);
  } else {
    document.querySelector('.tab[onclick*="volumes"]').textContent = 'Chapters';
    renderVolChapters(null);
  }
}

function renderHero() {
  const m = data.manga;
  const cover = m.cover
    ? `<img src="${m.cover}" alt="${m.title}">`
    : `<div class="no-cover">📖</div>`;
  document.getElementById('hero-wrap').innerHTML = `
    <div class="hero">
      <div class="hero-cover">${cover}</div>
      <div class="hero-info">
        <div class="hero-title">${m.title}</div>
        <div class="hero-meta">
          ${m.author ? `<span>${m.author}</span>` : ''}
          ${m.total_volumes ? `<span class="badge badge-vol">${m.total_volumes} Volumes</span>` : ''}
          <span>${m.total_chapters} Chapters</span>
          ${m.status ? `<span class="badge badge-status">${m.status}</span>` : ''}
        </div>
        ${m.description ? `<div class="hero-desc">${m.description}</div>` : ''}
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="readFirst()">▶ Read First</button>
          <button class="btn btn-ghost" onclick="scrapeCover()">🖼 Fetch Cover</button>
        </div>
      </div>
    </div>`;
}

function renderVolumes() {
  if (!data.volumes.length) { document.getElementById('vol-grid').innerHTML = ''; return; }
  document.getElementById('vol-grid').innerHTML = data.volumes.map(v => `
    <div class="vol-card" id="vol-${v.id}" onclick="selectVolume('${v.id}')">
      <div class="vol-cover">
        ${v.cover ? `<img src="${v.cover}" alt="${v.title}">` : '<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--border);">📚</div>'}
      </div>
      <div class="vol-info">
        <div class="vol-title">Vol.${v.volume_number}</div>
        <div class="vol-meta">${v.title || ''}</div>
      </div>
    </div>`).join('');
}

function selectVolume(volId) {
  activeVol = volId;
  document.querySelectorAll('.vol-card').forEach(c => c.classList.remove('active-vol'));
  const el = document.getElementById(`vol-${volId}`);
  if (el) el.classList.add('active-vol');
  renderVolChapters(volId);
}

function renderVolChapters(volId) {
  const chapters = volId
    ? data.chapters.filter(c => c.volume_id === volId)
    : data.chapters;
  document.getElementById('vol-chapters').innerHTML = chaptersHtml(chapters);
}

function renderAllChapters() {
  document.getElementById('all-chapters').innerHTML = chaptersHtml(data.chapters);
}

function chaptersHtml(chapters) {
  return chapters.map(c => {
    const prog = data.progress[c.id];
    const isRead = prog?.is_read;
    const readDot = prog && prog.page > 0 && !isRead ? '<div class="ch-read-dot"></div>' : '';
    return `<a class="chapter-item ${isRead ? 'is-read' : ''}" href="/read/${MANGA_ID}/${c.id}">
      <div class="ch-left">
        <span class="ch-num">Ch.${c.chapter_number}</span>
        <span class="ch-title">${c.title || ''}</span>
      </div>
      <div class="ch-right">
        ${c.pages ? `<span class="ch-pages">${c.pages}p</span>` : ''}
        ${readDot}
        ${isRead ? '<span style="font-size:.7rem;color:var(--muted)">✓ Read</span>' : ''}
      </div>
    </a>`;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (tab==='volumes'?0:1)));
  document.querySelectorAll('.tab-content').forEach((c,i) => c.classList.toggle('active', i === (tab==='volumes'?0:1)));
}

async function readFirst() {
  const first = data.chapters[0];
  if (first) window.location = `/read/${MANGA_ID}/${first.id}`;
}

async function scrapeCover() {
  await fetch(`/api/manga/${MANGA_ID}/scrape-cover`, {method:'POST'});
  setTimeout(load, 3000);
}

load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

{% include '_sidebar.html' %}

<!-- MAIN CONTENT -->
<div id="main">
  <div class="top-bar">
    <button id="menu-btn" onclick="openMobileSidebar()">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="top-bar-title">Library</div>
    <div class="top-actions">
      <a href="/search" class="btn btn-primary">+ Add Manga</a>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search library…" oninput="filterLibrary(this.value)">
    </div>
  </div>

  <!-- CONTINUE READING -->
  <div class="section" id="continue-section" style="display:none;">
    <div class="section-header">
      <div>
        <div class="section-title">Continue Reading</div>
        <div class="section-sub">Pick up where you left off</div>
      </div>
    </div>
    <div class="continue-row" id="continue-row"></div>
  </div>

  <!-- RECENTLY ADDED -->
  <div class="section" id="recent-section" style="display:none;">
    <div class="section-header">
      <div>
        <div class="section-title">Recently Added</div>
        <div class="section-sub">New to your library</div>
      </div>
    </div>
    <div class="grid" id="recent-grid"></div>
  </div>

  <!-- ALL MANGA -->
  <div class="section">
    <div class="section-header">
      <div class="section-title" id="all-label">All Manga</div>
      <span id="count-label" style="font-size:.8rem;color:var(--muted);"></span>
    </div>
    <div class="grid" id="manga-grid"></div>
    <div id="empty-state" style="display:none;">
      <h2>No manga yet</h2>
      <p>Drop files in your manga folder or scan your library to get started.</p><br>
      <button class="btn btn-primary" id="scan-lib-btn" onclick="scanLibrary()">Scan Library Now</button>
      <div class="progress-bar" id="scan-progress-bar" style="display:none;margin-top:1rem;"><div class="progress-fill" id="scan-progress-fill" style="width:0%"></div></div>
      <div id="scan-status" style="font-size:.8rem;color:var(--muted);margin-top:.5rem;"></div>
    </div>
  </div>
</div>

<div id="edit-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;" onclick="if(event.target===this)closeEditModal()">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:1.5rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 style="font-family:'Dela Gothic One',sans-serif;font-size:1.1rem;">Edit Metadata</h2>
      <button onclick="closeEditModal()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;">✕</button>
    </div>
    <div id="edit-form" style="display:flex;flex-direction:column;gap:.6rem;"></div>
    <div style="display:flex;gap:.75rem;margin-top:1rem;">
      <button class="btn btn-primary" onclick="saveEdit()" style="flex:1;">Save</button>
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
    </div>
    <div id="edit-status" style="text-align:center;font-size:.78rem;margin-top:.5rem;height:1.2rem;"></div>
  </div>
</div>

<script>
let editMangaId = null;
let editOriginal = null;
let allManga = [];

async function loadHome() {
  const [contRes, recRes] = await Promise.all([
    fetch('/api/continue-reading'),
    fetch('/api/recently-added')
  ]);
  const continueData = await contRes.json();
  const recentData = await recRes.json();

  if (continueData.length) {
    document.getElementById('continue-section').style.display = 'block';
    document.getElementById('continue-row').innerHTML = continueData.map(m => {
      const pct = m.pages > 0 ? (m.page / m.pages * 100) : 0;
      return `<div class="continue-card" onclick="window.location='/read/${m.slug || m.id}/${m.chapter_slug || m.chapter_id}'">
        <div class="continue-cover"><img src="${m.cover || ''}" onerror="this.style.display='none'" alt=""></div>
        <div class="continue-info">
          <div class="continue-title">${m.title}</div>
          <div class="continue-meta">Ch.${m.chapter_number}${m.chapter_title ? ' — '+m.chapter_title : ''}</div>
          <div class="continue-progress"><div class="continue-bar" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    }).join('');
  }

  if (recentData.length) {
    document.getElementById('recent-section').style.display = 'block';
    document.getElementById('recent-grid').innerHTML = recentData.map(m => renderCard(m)).join('');
  }

  loadLibrary();
}

async function loadLibrary(q = '') {
  const res = await fetch(`/api/library?q=${encodeURIComponent(q)}`);
  allManga = await res.json();
  document.getElementById('count-label').textContent = `${allManga.length} titles`;
  const grid = document.getElementById('manga-grid');
  const empty = document.getElementById('empty-state');
  if (!allManga.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = allManga.map(m => renderCard(m)).join('');
}

function renderCard(m) {
  const dc = m.downloaded_chapters ?? 0;
  const chBadge = `${dc} ch`;
  const cover = m.cover
    ? `<img src="${m.cover}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="no-cover">📖</div>`;
  return `<div class="card ${m.processing ? 'processing' : ''}" onclick="window.location='/manga/${m.slug || m.id}'">
    <div class="card-cover">
      ${cover}
      <div class="card-progress">${m.processing ? '<div class="card-progress-bar processing"></div>' : '<div class="card-progress-bar" style="width:0%"></div>'}</div>
      <button class="card-edit" onclick="event.stopPropagation();openEditModal('${m.id}')" title="Edit metadata">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      </button>
    </div>
    <div class="card-info">
      <div class="card-title">${m.title}</div>
      <div class="card-meta">${chBadge}</div>
    </div>
  </div>`;
}

function filterLibrary(q) { loadLibrary(q); }

let _scanTimer = null;
async function scanLibrary() {
  const btn = document.getElementById('scan-lib-btn');
  const bar = document.getElementById('scan-progress-bar');
  const fill = document.getElementById('scan-progress-fill');
  const status = document.getElementById('scan-status');
  btn.disabled = true; btn.textContent = 'Scanning...';
  bar.style.display = 'block'; fill.style.width = '0%'; status.textContent = 'Starting scan...';
  const res = await fetch('/api/scan-now', {method:'POST'});
  if (!res.ok) { status.textContent = 'Scan failed.'; btn.disabled = false; btn.textContent = 'Scan Library Now'; return; }
  if (_scanTimer) clearInterval(_scanTimer);
  _scanTimer = setInterval(async () => {
    const pr = await fetch('/api/scan-progress');
    const p = await pr.json();
    if (p.total > 0) fill.style.width = Math.round((p.current / p.total) * 100) + '%';
    status.textContent = p.message;
    if (!p.running) {
      clearInterval(_scanTimer);
      btn.disabled = false; btn.textContent = 'Scan Library Now';
      setTimeout(() => { bar.style.display = 'none'; status.textContent = ''; }, 5000);
      loadHome();
    }
  }, 500);
}

async function openEditModal(mangaId) {
  editMangaId = mangaId;
  const res = await fetch(`/api/manga/${mangaId}/nfo`);
  editOriginal = await res.json();
  const fields = [
    {key:'title',label:'Title',type:'text'},
    {key:'author',label:'Author',type:'text'},
    {key:'artist',label:'Artist',type:'text'},
    {key:'genre',label:'Genre',type:'text'},
    {key:'status',label:'Status',type:'select',options:['','Publishing','Completed','On Hiatus','Cancelled']},
    {key:'publisher',label:'Publisher',type:'text'},
    {key:'year',label:'Year',type:'number'},
    {key:'total_chapters',label:'Total Chapters',type:'number'},
    {key:'cover',label:'Cover URL',type:'text'},
    {key:'summary',label:'Summary',type:'textarea'}
  ];
  document.getElementById('edit-form').innerHTML = fields.map(f => {
    const val = editOriginal[f.key] || '';
    if (f.type === 'select') {
      return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label>
        <select class="field" data-key="${f.key}">${f.options.map(o=>`<option value="${o}"${o==val?' selected':''}>${o||'—'}</option>`).join('')}</select></div>`;
    }
    if (f.type === 'textarea') {
      return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label>
        <textarea class="field" data-key="${f.key}" rows="3" style="resize:vertical;">${val}</textarea></div>`;
    }
    return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label>
      <input class="field" type="${f.type}" data-key="${f.key}" value="${val}"></div>`;
  }).join('');
  document.getElementById('edit-overlay').style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('edit-overlay').style.display = 'none';
  editMangaId = null;
}

async function saveEdit() {
  const form = document.getElementById('edit-form');
  const data = {};
  form.querySelectorAll('[data-key]').forEach(el => {
    let v = el.value;
    const k = el.dataset.key;
    if (k === 'year' && v) v = parseInt(v);
    if (k === 'total_chapters' && v) v = parseInt(v);
    data[k] = v || null;
  });
  document.getElementById('edit-status').textContent = 'Saving…';
  const res = await fetch(`/api/manga/${editMangaId}/nfo`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  const result = await res.json();
  if (result.ok) {
    document.getElementById('edit-status').style.color = '#7de87d';
    document.getElementById('edit-status').textContent = '✓ Saved';
    closeEditModal();
    loadLibrary();
  } else {
    document.getElementById('edit-status').style.color = 'var(--accent)';
    document.getElementById('edit-status').textContent = 'Save failed';
  }
}

loadHome();
</script>
</body>
</html>

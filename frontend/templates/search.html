<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;--accent:#e8403a;--accent2:#ff7a35;--text:#eeeef0;--muted:#7a7a8c;--radius:10px;--sidebar-w:240px;--sidebar-collapsed:60px; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  /* SIDEBAR */
  #sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:width .3s ease;overflow:hidden;}
  #sidebar.collapsed{width:var(--sidebar-collapsed);}
  #sidebar-header{display:flex;align-items:center;padding:.75rem;gap:.5rem;border-bottom:1px solid var(--border);min-height:60px;}
  #sidebar-logo{flex-shrink:0;height:36px;width:36px;border-radius:8px;object-fit:cover;}
  #sidebar-logo-wrap{display:flex;align-items:center;gap:.5rem;text-decoration:none;overflow:hidden;}
  #sidebar-title{font-family:'Dela Gothic One',sans-serif;font-size:1rem;white-space:nowrap;opacity:1;transition:opacity .2s;}
  #sidebar.collapsed #sidebar-title{opacity:0;pointer-events:none;}
  #toggle-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:.25rem;border-radius:6px;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  #toggle-btn:hover{color:var(--text);background:var(--surface2);}
  #toggle-btn svg{width:20px;height:20px;}
  #sidebar.collapsed #toggle-btn svg{transform:rotate(180deg);}
  #sidebar-nav{flex:1;padding:.75rem;display:flex;flex-direction:column;gap:.25rem;}
  .nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;border-radius:8px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s;white-space:nowrap;overflow:hidden;}
  .nav-item:hover{color:var(--text);background:var(--surface2);}
  .nav-item.active{color:var(--text);background:var(--surface2);border-left:3px solid var(--accent);}
  .nav-item svg{width:18px;height:18px;flex-shrink:0;}
  .nav-item span{opacity:1;transition:opacity .2s;}
  #sidebar.collapsed .nav-item span{opacity:0;pointer-events:none;}
  #sidebar-footer{padding:.75rem;border-top:1px solid var(--border);}
  .sidebar-user{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;border-radius:8px;background:var(--surface2);overflow:hidden;}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
  .user-avatar.admin-av{background:rgba(232,64,58,.15);color:var(--accent);}
  .user-info{flex:1;min-width:0;transition:opacity .2s;}
  #sidebar.collapsed .user-info{opacity:0;pointer-events:none;}
  .user-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-role{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:.25rem;border-radius:4px;transition:all .2s;flex-shrink:0;}
  .logout-btn:hover{color:var(--accent);}

  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s;}
  #overlay.active{opacity:1;pointer-events:auto;}

  #main{margin-left:var(--sidebar-w);transition:margin-left .3s ease;padding-bottom:2rem;}
  #main.expanded{margin-left:var(--sidebar-collapsed);}

  .top-bar{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;height:60px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50;}
  #menu-btn{display:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:.25rem;border-radius:6px;transition:all .2s;}
  #menu-btn:hover{color:var(--text);background:var(--surface2);}
  .top-bar-title{font-family:'Dela Gothic One',sans-serif;font-size:1rem;}

  .btn{padding:.6rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#c93530;}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

  .page-content{padding:1.5rem;}
  h1{font-family:'Dela Gothic One',sans-serif;font-size:1.5rem;margin-bottom:1.25rem;}
  .search-row{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;}
  .search-input{flex:1;min-width:240px;padding:.65rem 1rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit;}
  .search-input:focus{border-color:var(--accent);}
  select.search-input{max-width:160px;cursor:pointer;}
  .results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.2rem;margin-top:1.5rem;}
  .result-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s,border-color .2s;}
  .result-card:hover{transform:translateY(-3px);border-color:var(--accent);}
  .result-cover{aspect-ratio:2/3;background:var(--surface2);overflow:hidden;}
  .result-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .result-info{padding:.75rem;}
  .result-title{font-size:.82rem;font-weight:600;line-height:1.3;margin-bottom:.4rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .result-meta{font-size:.72rem;color:var(--muted);margin-bottom:.5rem;text-transform:capitalize;}

  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s;}
  #modal-overlay.open{opacity:1;pointer-events:all;}
  #modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;}
  .modal-header{display:flex;gap:1rem;padding:1.25rem;border-bottom:1px solid var(--border);}
  .modal-cover{width:90px;flex-shrink:0;aspect-ratio:2/3;border-radius:6px;overflow:hidden;background:var(--surface2);}
  .modal-cover img{width:100%;height:100%;object-fit:cover;}
  .modal-meta{flex:1;}
  .modal-title{font-family:'Dela Gothic One',sans-serif;font-size:1.1rem;margin-bottom:.35rem;}
  .modal-desc{font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:.75rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .modal-close{align-self:flex-start;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.2rem;}
  .chapter-list{flex:1;overflow-y:auto;padding:.75rem;}
  .chapter-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;border-radius:6px;border:1px solid var(--border);margin-bottom:.4rem;gap:.75rem;background:var(--surface2);}
  .chapter-item:hover{border-color:var(--accent);}
  .ch-name{font-size:.85rem;font-weight:500;}
  .ch-pages{font-size:.75rem;color:var(--muted);}
  .dl-btn{padding:.3rem .7rem;border-radius:5px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;background:var(--accent);color:#fff;transition:background .2s;white-space:nowrap;}
  .dl-btn:hover{background:#c93530;}
  .dl-btn.done{background:#2a5c2a;color:#7de87d;cursor:default;}
  .dl-btn.loading{background:var(--surface);color:var(--muted);cursor:default;}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty-search{text-align:center;padding:4rem 1rem;color:var(--muted);}
  .empty-search h3{font-family:'Dela Gothic One',sans-serif;color:var(--text);margin-bottom:.5rem;}

  @media (max-width: 768px) {
    #sidebar{transform:translateX(-100%);width:var(--sidebar-w) !important;}
    #sidebar.mobile-open{transform:translateX(0);}
    #toggle-btn{display:none !important;}
    #menu-btn{display:flex !important;}
    #main{margin-left:0 !important;}
  }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <a id="sidebar-logo-wrap" href="/">
      <img id="sidebar-logo" src="/static/img/logo.png" alt="MangaShelf">
      <span id="sidebar-title">MangaShelf</span>
    </a>
    <button id="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
  </div>
  <nav id="sidebar-nav">
    <a href="/" class="nav-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      <span>Library</span>
    </a>
    <a href="/search" class="nav-item active">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <span>Discover</span>
    </a>
    <a href="/sources" class="nav-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
      <span>Sources</span>
    </a>
  </nav>
  <div id="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar{% if user and user.role == 'admin' %} admin-av{% endif %}">{{ user.username[0] if user and user.username else 'G' }}</div>
      <div class="user-info">
        <div class="user-name">{{ user.username if user else 'Guest' }}</div>
        <div class="user-role">{{ user.role if user else '' }}</div>
      </div>
      <a href="/logout" class="logout-btn" title="Sign out">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </a>
    </div>
  </div>
</aside>

<div id="overlay" onclick="closeMobileSidebar()"></div>

<div id="main">
  <div class="top-bar">
    <button id="menu-btn" onclick="openMobileSidebar()">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="top-bar-title">Discover</div>
  </div>
  <div class="page-content">
    <h1>Discover Manga</h1>
    <div class="search-row">
      <input class="search-input" type="text" id="q" placeholder="Search title…" onkeydown="if(event.key==='Enter')doSearch()">
      <select class="search-input" id="source-sel"></select>
      <button class="btn btn-primary" onclick="doSearch()">Search</button>
    </div>
    <div id="results-wrap">
      <div class="empty-search"><h3>Search for manga above</h3><p>Browse MangaDex and your configured sources.</p></div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-cover"><img id="modal-img" src="" alt=""></div>
      <div class="modal-meta">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-desc" id="modal-desc"></div>
        <span id="modal-status" style="font-size:.75rem;color:var(--muted);text-transform:capitalize;"></span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="chapter-list" id="chapter-list">
      <div style="text-align:center;padding:2rem;color:var(--muted);">Loading chapters…</div>
    </div>
  </div>
</div>

<script>
let sources = [];
let currentResult = null;

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
  document.getElementById('main').classList.toggle('expanded');
  localStorage.setItem('sidebarCollapsed', document.getElementById('sidebar').classList.contains('collapsed'));
}

function openMobileSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('overlay').classList.add('active');
}

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('overlay').classList.remove('active');
}

(function() {
  const collapsed = localStorage.getItem('sidebarCollapsed') === 'true';
  if (collapsed) {
    document.getElementById('sidebar').classList.add('collapsed');
    document.getElementById('main').classList.add('expanded');
  }
})();

async function loadSources() {
  const res = await fetch('/api/sources');
  sources = await res.json();
  const sel = document.getElementById('source-sel');
  sel.innerHTML = sources.filter(s=>s.enabled).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  const src = document.getElementById('source-sel').value;
  if (!q) return;
  const srcObj = sources.find(s=>s.id===src);
  const srcType = srcObj?.type || 'mangadex';
  document.getElementById('results-wrap').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted);"><div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 1rem;"></div><br>Searching…</div>';
  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&source=${srcType}`);
  const data = await res.json();
  if (!data.length) {
    document.getElementById('results-wrap').innerHTML = '<div class="empty-search"><h3>No results</h3><p>Try a different search term.</p></div>';
    return;
  }
  document.getElementById('results-wrap').innerHTML = `<div class="results-grid">${data.map((m,i)=>`
    <div class="result-card" onclick="openManga(${i})">
      <div class="result-cover"><img src="${m.cover||''}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'"></div>
      <div class="result-info">
        <div class="result-title">${m.title}</div>
        <div class="result-meta">${m.status||'unknown'}</div>
        <button class="btn btn-ghost" style="width:100%;padding:.4rem;font-size:.75rem;" onclick="event.stopPropagation();openManga(${i})">View Chapters</button>
      </div>
    </div>`).join('')}</div>`;
  window._searchResults = data;
}

async function openManga(idx) {
  currentResult = window._searchResults[idx];
  document.getElementById('modal-title').textContent = currentResult.title;
  document.getElementById('modal-desc').textContent = currentResult.description || '';
  document.getElementById('modal-img').src = currentResult.cover || '';
  document.getElementById('modal-status').textContent = currentResult.status || '';
  document.getElementById('chapter-list').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Loading chapters…</div>';
  document.getElementById('modal-overlay').classList.add('open');

  const res = await fetch(`/api/manga-source/${currentResult.source}/${currentResult.id}/chapters`);
  const chapters = await res.json();
  if (!chapters.length) {
    document.getElementById('chapter-list').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">No chapters found.</div>';
    return;
  }
  document.getElementById('chapter-list').innerHTML = chapters.map(c=>`
    <div class="chapter-item" id="ch-${c.id}">
      <div>
        <div class="ch-name">Chapter ${c.chapter} ${c.title && c.title !== `Chapter ${c.chapter}` ? '— '+c.title : ''}</div>
        <div class="ch-pages">${c.pages ? c.pages+' pages' : ''}</div>
      </div>
      <button class="dl-btn" onclick="downloadChapter('${c.id}','${c.chapter}')">↓ Download</button>
    </div>`).join('');
}

async function downloadChapter(chId, chNum) {
  const btn = document.querySelector(`#ch-${chId} .dl-btn`);
  btn.textContent = '…'; btn.className = 'dl-btn loading';
  const res = await fetch('/api/download', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({chapter_id:chId, manga_title:currentResult.title, chapter_num:chNum, source:currentResult.source})
  });
  const {job_id} = await res.json();
  pollDownload(job_id, btn);
}

async function pollDownload(jobId, btn) {
  const res = await fetch(`/api/download/${jobId}`);
  const d = await res.json();
  if (d.status === 'downloading') {
    btn.textContent = d.progress + '%';
    setTimeout(() => pollDownload(jobId, btn), 800);
  } else if (d.status === 'complete') {
    btn.textContent = '✓ Done'; btn.className = 'dl-btn done';
  } else {
    btn.textContent = '✗ Error'; btn.style.background = '#5c2a2a';
    setTimeout(() => pollDownload(jobId, btn), 2000);
  }
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

loadSources();
</script>
</body>
</html>

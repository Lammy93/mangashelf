<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads — MangaShelf</title>
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
.dl-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
.dl-header h2 { margin:0; font-size:1.3rem; font-weight:600; }
.dl-actions { display:flex; gap:.5rem; margin-left:auto; }
.dl-table { width:100%; border-collapse:collapse; }
.dl-table th { text-align:left; padding:.6rem .8rem; font-size:.75rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); border-bottom:1px solid var(--border); font-weight:600; }
.dl-table td { padding:.6rem .8rem; border-bottom:1px solid var(--border); font-size:.85rem; vertical-align:middle; }
.dl-table tr:hover td { background:var(--surface); }
.dl-title { max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dl-title a { color:var(--text); text-decoration:none; }
.dl-title a:hover { color:var(--accent); }
.status-badge { display:inline-flex; align-items:center; gap:.35rem; padding:.15rem .55rem; border-radius:99px; font-size:.75rem; font-weight:500; }
.status-queued { background:rgba(255,255,255,.06); color:var(--muted); }
.status-running { background:rgba(232,64,58,.15); color:var(--accent); }
.status-completed { background:rgba(34,197,94,.12); color:#22c55e; }
.status-failed { background:rgba(255,77,77,.12); color:#ff4d4d; }
.status-cancelled { background:rgba(255,255,255,.06); color:var(--muted); }
.progress-wrap { width:80px; height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:4px; transition:width .3s; }
.dl-actions-cell { display:flex; gap:.3rem; }
.dl-empty { text-align:center; padding:3rem; color:var(--muted); }
.dl-empty svg { width:48px; height:48px; opacity:.3; margin-bottom:1rem; }
.spinner-inline { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
@media(max-width:700px){ .dl-header { flex-direction:column; align-items:stretch; } .dl-actions { margin-left:0; } .dl-table th:nth-child(3),.dl-table td:nth-child(3) { display:none; } }
</style>
</head>
<body>
{% include '_sidebar.html' %}
<div id="main">
  <div class="top-bar">
    <button class="mobile-menu-btn" onclick="openMobileSidebar()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="top-bar-title">Downloads</div>
  </div>
  <div class="content">
    <div class="dl-header">
      <h2>Download Queue</h2>
      <div class="dl-actions">
        <button class="btn btn-ghost" id="retry-all-btn" onclick="retryAll()">Retry Failed</button>
        <button class="btn btn-ghost" id="clear-btn" onclick="clearCompleted()">Clear Completed</button>
        <button class="btn btn-primary" id="refresh-btn" onclick="loadQueue()">Refresh</button>
      </div>
    </div>
    <div id="queue-wrap">
      <div class="dl-empty">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        <p>Loading downloads...</p>
      </div>
    </div>
  </div>
</div>

<script>
let pollTimer = null;

async function loadQueue() {
  const wrap = document.getElementById('queue-wrap');
  try {
    const res = await fetch('/api/downloads/queue');
    const jobs = await res.json();
    if (!jobs || jobs.length === 0) {
      wrap.innerHTML = '<div class="dl-empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg><p>No downloads yet</p><p style="font-size:.8rem;margin-top:.3rem;">Use the Discover page to find and download manga chapters.</p></div>';
      return;
    }
    let html = `<table class="dl-table"><thead><tr><th>Manga</th><th>Chapter</th><th>Source</th><th>Format</th><th>Status</th><th>Progress</th><th></th></tr></thead><tbody>`;
    for (const j of jobs) {
      const statusClass = `status-${j.status}`;
      const progress = j.progress || 0;
      const statusLabel = j.status.charAt(0).toUpperCase() + j.status.slice(1);
      const dateStr = j.created_at ? new Date(j.created_at + 'Z').toLocaleString() : '';
      const canCancel = j.status === 'queued' || j.status === 'running';
      const canRetry = j.status === 'failed' || j.status === 'cancelled';
      const isRunning = j.status === 'running';
      const fmt = j.output_format || 'cbz';
      html += `<tr>
        <td><div class="dl-title" title="${escHtml(j.manga_title || '')}">${escHtml(j.manga_title || '')}</div></td>
        <td>${escHtml(j.chapter_number || '?')}</td>
        <td style="color:var(--muted);font-size:.8rem;">${escHtml(j.source || '')}</td>
        <td><span class="status-badge" style="background:rgba(255,255,255,.06);text-transform:uppercase;font-size:.65rem;">${fmt}</span></td>
        <td><span class="status-badge ${statusClass}">${isRunning ? '<span class="spinner-inline"></span>' : ''} ${statusLabel}</span></td>
        <td>
          <div class="progress-wrap"><div class="progress-fill" style="width:${progress}%"></div></div>
          <span style="font-size:.7rem;color:var(--muted);">${progress}%</span>
        </td>
        <td class="dl-actions-cell">
          ${canCancel ? `<button class="btn btn-ghost btn-xs" onclick="cancelJob('${j.id}')">Cancel</button>` : ''}
          ${canRetry ? `<button class="btn btn-ghost btn-xs" onclick="retryJob('${j.id}')">Retry</button>` : ''}
          ${j.error ? `<span class="status-badge status-failed" title="${escHtml(j.error)}">!</span>` : ''}
        </td>
      </tr>`;
    }
    html += '</tbody></table>';
    wrap.innerHTML = html;
  } catch(e) {
    wrap.innerHTML = `<div class="dl-empty"><p>Failed to load: ${e.message}</p></div>`;
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function cancelJob(id) {
  await fetch(`/api/jobs/${id}/cancel`, {method:'POST'});
  loadQueue();
}

async function retryJob(id) {
  await fetch(`/api/downloads/retry/${id}`, {method:'POST'});
  loadQueue();
}

async function retryAll() {
  document.getElementById('retry-all-btn').disabled = true;
  document.getElementById('retry-all-btn').textContent = 'Retrying...';
  await fetch('/api/downloads/retry-all', {method:'POST'});
  loadQueue();
  document.getElementById('retry-all-btn').disabled = false;
  document.getElementById('retry-all-btn').textContent = 'Retry Failed';
}

async function clearCompleted() {
  await fetch('/api/downloads/clear-completed', {method:'POST'});
  loadQueue();
}

function startPolling() { pollTimer = setInterval(loadQueue, 3000); }
function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

loadQueue();
startPolling();
</script>
</body>
</html>

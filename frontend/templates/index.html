<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;--accent:#e8403a;--accent2:#ff7a35;--text:#eeeef0;--muted:#7a7a8c;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  
  .nav-links{display:flex;gap:1.5rem;align-items:center;}.nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:color .2s;}.nav-links a:hover,.nav-links a.active{color:var(--text);}
  .nav-user{display:flex;align-items:center;gap:.75rem;}
  .user-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.3rem .75rem;font-size:.8rem;font-weight:600;}
  .user-badge.admin{border-color:var(--accent);color:var(--accent);}
  .btn{padding:.5rem 1rem;border-radius:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#c93530;}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

  /* SEARCH BAR */
  .search-bar{padding:1.5rem 2rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;}
  .search-wrap{flex:1;min-width:240px;position:relative;}
  .search-wrap input{width:100%;padding:.65rem 1rem .65rem 2.8rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit;}
  .search-wrap input:focus{border-color:var(--accent);}
  .search-wrap svg{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);opacity:.4;}

  /* SECTIONS */
  .section{padding:0 2rem 2.5rem;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .section-title{font-family:'Dela Gothic One',sans-serif;font-size:1.1rem;}
  .section-sub{font-size:.75rem;color:var(--muted);}

  /* CONTINUE READING - horizontal scroll */
  .continue-row{display:flex;gap:1rem;overflow-x:auto;padding-bottom:.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  .continue-card{flex-shrink:0;width:280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;cursor:pointer;transition:border-color .2s;}
  .continue-card:hover{border-color:var(--accent);}
  .continue-cover{width:70px;flex-shrink:0;background:var(--surface2);}
  .continue-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .continue-info{padding:.75rem;flex:1;min-width:0;}
  .continue-title{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .continue-meta{font-size:.75rem;color:var(--muted);margin:.2rem 0 .5rem;}
  .continue-progress{height:3px;background:var(--border);border-radius:2px;}
  .continue-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.2rem;}
  .card{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;text-decoration:none;color:inherit;display:block;}
  .card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 30px rgba(232,64,58,.12);}
  .card-cover{aspect-ratio:2/3;background:var(--surface2);overflow:hidden;position:relative;}
  .card-cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
  .card:hover .card-cover img{transform:scale(1.05);}
  .card-cover .no-cover{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--border);}
  .card-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.4);}
  .card-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .card-info{padding:.75rem;}
  .card-title{font-size:.82rem;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-meta{font-size:.72rem;color:var(--muted);margin-top:.2rem;}
  .badge{display:inline-block;padding:.12rem .45rem;border-radius:4px;font-size:.65rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
  .badge-vol{background:rgba(255,122,53,.12);color:var(--accent2);}
  .badge-new{background:rgba(232,64,58,.12);color:var(--accent);}

  /* SCRAPE BTN */
  .scrape-btn{padding:.25rem .6rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.7rem;cursor:pointer;font-family:inherit;transition:all .2s;}
  .scrape-btn:hover{border-color:var(--accent2);color:var(--accent2);}

  #empty-state{text-align:center;padding:5rem 1rem;color:var(--muted);}
  #empty-state h2{font-family:'Dela Gothic One',sans-serif;font-size:1.4rem;color:var(--text);margin-bottom:.5rem;}
</style>
</head>
<body>
<nav>
  <a href="/" style="display:flex;align-items:center;text-decoration:none;"><img src="/static/img/logo.png" alt="MangaShelf" style="height:42px;width:42px;object-fit:cover;border-radius:8px;"></a>
  <div class="nav-links">
    <a href="/" class="active">Library</a>
    <a href="/search">Discover</a>
    <a href="/sources">Sources</a>
    {% if user.role == 'admin' %}<a href="/admin">Admin</a>{% endif %}
  </div>
  <div class="nav-user">
    <span class="user-badge {% if user.role == 'admin' %}admin{% endif %}">{{ user.username }}</span>
    <a href="/logout" class="btn btn-ghost">Sign out</a>
  </div>
</nav>

<div class="search-bar">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search library…" oninput="filterLibrary(this.value)">
  </div>
  <a href="/search" class="btn btn-primary">+ Add Manga</a>
  <button class="btn btn-ghost" onclick="scrapeAllCovers()">🖼 Scrape Covers</button>
</div>

<!-- CONTINUE READING -->
<div class="section" id="continue-section" style="display:none;">
  <div class="section-header">
    <div>
      <div class="section-title">Continue Reading</div>
      <div class="section-sub">Pick up where you left off</div>
    </div>
  </div>
  <div class="continue-row" id="continue-row"></div>
</div>

<!-- RECENTLY ADDED -->
<div class="section" id="recent-section" style="display:none;">
  <div class="section-header">
    <div>
      <div class="section-title">Recently Added</div>
      <div class="section-sub">New to your library</div>
    </div>
  </div>
  <div class="grid" id="recent-grid"></div>
</div>

<!-- ALL MANGA -->
<div class="section">
  <div class="section-header">
    <div class="section-title" id="all-label">All Manga</div>
    <span id="count-label" style="font-size:.8rem;color:var(--muted);"></span>
  </div>
  <div class="grid" id="manga-grid"></div>
  <div id="empty-state" style="display:none;">
    <h2>No manga yet</h2>
    <p>Drop files in your manga folder or use Discover to add new manga.</p><br>
    <a href="/search" class="btn btn-primary">Browse Sources</a>
  </div>
</div>

<script>
let allManga = [];

async function loadHome() {
  const [contRes, recRes] = await Promise.all([
    fetch('/api/continue-reading'),
    fetch('/api/recently-added')
  ]);
  const continueData = await contRes.json();
  const recentData = await recRes.json();

  if (continueData.length) {
    document.getElementById('continue-section').style.display = 'block';
    document.getElementById('continue-row').innerHTML = continueData.map(m => {
      const pct = m.pages > 0 ? (m.page / m.pages * 100) : 0;
      return `<div class="continue-card" onclick="window.location='/read/${m.id}/${m.chapter_id}'">
        <div class="continue-cover"><img src="${m.cover || ''}" onerror="this.style.display='none'" alt=""></div>
        <div class="continue-info">
          <div class="continue-title">${m.title}</div>
          <div class="continue-meta">Ch.${m.chapter_number}${m.chapter_title ? ' — '+m.chapter_title : ''}</div>
          <div class="continue-progress"><div class="continue-bar" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    }).join('');
  }

  if (recentData.length) {
    document.getElementById('recent-section').style.display = 'block';
    document.getElementById('recent-grid').innerHTML = recentData.map(m => renderCard(m)).join('');
  }

  loadLibrary();
}

async function loadLibrary(q = '') {
  const res = await fetch(`/api/library?q=${encodeURIComponent(q)}`);
  allManga = await res.json();
  document.getElementById('count-label').textContent = `${allManga.length} titles`;
  const grid = document.getElementById('manga-grid');
  const empty = document.getElementById('empty-state');
  if (!allManga.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = allManga.map(m => renderCard(m)).join('');
}

function renderCard(m) {
  const volBadge = m.total_volumes > 0 ? `<span class="badge badge-vol">${m.total_volumes} vol</span>` : '';
  const chBadge = `${m.total_chapters} ch`;
  const cover = m.cover
    ? `<img src="${m.cover}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="no-cover">📖</div>`;
  return `<a class="card" href="/manga/${m.id}">
    <div class="card-cover">
      ${cover}
      <div class="card-progress"><div class="card-progress-bar" style="width:0%"></div></div>
    </div>
    <div class="card-info">
      <div class="card-title">${m.title}</div>
      <div class="card-meta">${volBadge} ${chBadge}</div>
    </div>
  </a>`;
}

function filterLibrary(q) { loadLibrary(q); }

async function scrapeAllCovers() {
  const btn = event.target;
  btn.textContent = '⏳ Scraping…'; btn.disabled = true;
  await fetch('/api/scrape-all-covers', {method:'POST'});
  btn.textContent = '✓ Started';
  setTimeout(() => { btn.textContent = '🖼 Scrape Covers'; btn.disabled = false; loadLibrary(); }, 3000);
}

loadHome();
</script>
</body>
</html>

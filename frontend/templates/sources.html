<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sources — MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

{% include '_sidebar.html' %}

<div id="main">
  <div class="top-bar">
    <button id="menu-btn" onclick="openMobileSidebar()">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="top-bar-title">Sources</div>
  </div>
  <div class="page-content">
    <h1>Sources</h1>
    <p class="subtitle">Manage where MangaShelf searches and downloads manga from.</p>

    <div class="card">
      <h2>Add Custom Source</h2>
      <div class="add-form">
        <div class="form-row">
          <input class="field" type="text" id="new-name" placeholder="Source name (e.g. MangaFox)">
          <input class="field" type="url" id="new-url" placeholder="Base URL (e.g. https://mangafox.com)">
        </div>
        <div>
          <button class="btn btn-primary" onclick="addSource()">+ Add Source</button>
        </div>
      </div>
    </div>

    <div class="section-label">Configured Sources</div>
    <div id="sources-list"></div>
  </div>
</div>

<script>
(function() {
  const collapsed = localStorage.getItem('sidebarCollapsed') === 'true';
  if (collapsed) {
    document.getElementById('sidebar').classList.add('collapsed');
    document.getElementById('main').classList.add('expanded');
  }
})();

async function loadSources() {
  const res = await fetch('/api/sources');
  const sources = await res.json();
  const list = document.getElementById('sources-list');
  const filtered = sources.filter(s => !['anilist', 'myanimelist'].includes(s.id) && s.type !== 'metadata');
  if (!filtered.length) { list.innerHTML = '<p style="color:var(--muted);font-size:.875rem;">No sources configured.</p>'; return; }
  list.innerHTML = filtered.map(s => {
    let icon = '🔗';
    if (s.id === 'mangadex') icon = '🌐';
    else if (s.id === 'mangafox') icon = '🦊';
    return `<div class="source-row" id="src-${s.id}">
      <div class="source-icon">${icon}</div>
      <div class="source-info">
        <div class="source-name">${s.name} <span class="badge ${s.type==='custom'?'badge-custom':'badge-builtin'}">${s.type}</span> ${!s.enabled?'<span class="badge badge-off">OFF</span>':''}</div>
        <div class="source-url">${s.base_url}</div>
      </div>
      <label class="toggle" title="Enable/Disable">
        <input type="checkbox" ${s.enabled?'checked':''} onchange="toggleSource('${s.id}')">
        <span class="slider"></span>
      </label>
      ${s.type==='custom'?`<button class="btn btn-danger" onclick="deleteSource('${s.id}')">✕</button>`:''}
    </div>`;
  }).join('');
}

async function addSource() {
  const name = document.getElementById('new-name').value.trim();
  const url = document.getElementById('new-url').value.trim();
  if (!name || !url) { alert('Please fill in both fields.'); return; }
  await fetch('/api/sources', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, base_url: url})
  });
  document.getElementById('new-name').value = '';
  document.getElementById('new-url').value = '';
  loadSources();
}

async function deleteSource(id) {
  if (!confirm('Remove this source?')) return;
  await fetch(`/api/sources/${id}`, {method:'DELETE'});
  loadSources();
}

async function toggleSource(id) {
  await fetch(`/api/sources/${id}/toggle`, {method:'PATCH'});
  loadSources();
}

loadSources();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

{% include '_sidebar.html' %}

<div id="main">
  <div class="top-bar">
    <button id="menu-btn" onclick="openMobileSidebar()">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="top-bar-title">Discover</div>
  </div>
  <div class="content">
    <h1 style="margin-bottom:1rem;">Discover Manga</h1>
    <div class="search-row">
      <input class="search-input" type="text" id="q" placeholder="Search title…" onkeydown="if(event.key==='Enter')doSearch()">
      <select class="search-input" id="source-sel"></select>
      <button class="btn btn-primary" onclick="doSearch()">Search</button>
      <button class="btn btn-ghost" id="search-all-btn" onclick="searchAll()">Search All</button>
      <select class="search-input" id="format-sel" style="max-width:90px;font-size:.75rem;">
        <option value="cbz">CBZ</option>
        <option value="pdf">PDF</option>
        <option value="epub">EPUB</option>
        <option value="cbr">CBR</option>
      </select>
    </div>
    <div id="results-wrap">
      <div class="empty-search"><h3>Search for manga above</h3><p>Browse MangaDex and your configured sources.</p></div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-cover"><img id="modal-img" src="" alt=""></div>
      <div class="modal-meta">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-desc" id="modal-desc"></div>
        <span id="modal-status" style="font-size:.75rem;color:var(--muted);text-transform:capitalize;"></span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="chapter-section">
      <div class="chapter-header">
        <h3 id="chapter-count"></h3>
        <button class="dl-all-btn" id="dl-all-btn" onclick="downloadAll()">↓ Download All</button>
      </div>
      <div class="chapter-list" id="chapter-list">
        <div style="text-align:center;padding:2rem;color:var(--muted);">Loading chapters…</div>
      </div>
    </div>
    <div id="metadata-section" style="display:none;padding:1rem;overflow-y:auto;max-height:400px;">
      <a id="meta-source-link" href="#" target="_blank" rel="noopener" class="btn btn-ghost" style="width:100%;margin-bottom:1rem;text-align:center;text-decoration:none;">View on source →</a>
      <div id="metadata-body"></div>
    </div>
  </div>
</div>

<script>
let sources = [];
let currentResult = null;

(function() {
  const collapsed = localStorage.getItem('sidebarCollapsed') === 'true';
  if (collapsed) {
    document.getElementById('sidebar').classList.add('collapsed');
    document.getElementById('main').classList.add('expanded');
  }
})();

async function loadSources() {
  const res = await fetch('/api/sources');
  sources = await res.json();
  const sel = document.getElementById('source-sel');
  sel.innerHTML = sources.filter(s=>s.enabled && s.type !== 'metadata').map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  const src = document.getElementById('source-sel').value;
  if (!q) return;
  const srcObj = sources.find(s=>s.id===src);
  const srcType = srcObj?.type || 'mangadex';
  document.getElementById('results-wrap').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted);"><div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 1rem;"></div><br>Searching…</div>';
  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&source=${srcType}`);
  const data = await res.json();
  if (!data.length) {
    document.getElementById('results-wrap').innerHTML = '<div class="empty-search"><h3>No results</h3><p>Try a different search term.</p></div>';
    return;
  }
  document.getElementById('results-wrap').innerHTML = `<div class="results-grid">${data.map((m,i)=>{
    const coverUrl = m.cover ? (m.cover.includes('mangadex') ? m.cover.replace('.256.jpg', '.512.jpg') : m.cover) : '';
    const chInfo = m.chapters ? `<span class="ch-badge">${m.chapters} ch</span>` : '';
    const genres = (m.genres||[]).slice(0,2).map(g=>`<span class="genre-badge">${g}</span>`).join('');
        const isDownloadSource = ['mangadex','mangafox'].includes(m.source) || m.source.startsWith('mangal_');
    const isFollowed = window._followedIds && window._followedIds.includes(`${m.source}::${m.id}`);
    return `
    <div class="result-card" onclick="openManga(${i},'${srcType}')">
      <div class="result-cover"><img src="${coverUrl}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'"></div>
      <div class="result-info">
        <div class="result-title">${m.title}</div>
        <div class="result-meta">${m.status||'unknown'} ${chInfo}</div>
        <div class="result-genres">${genres}</div>
        ${isDownloadSource ? `<button class="btn btn-ghost" style="width:100%;padding:.4rem;font-size:.75rem;" onclick="event.stopPropagation();openManga(${i},'${srcType}')">View Details</button>` : `<button class="follow-btn${isFollowed?' following':''}" style="width:100%;margin-bottom:.3rem;" onclick="event.stopPropagation();toggleFollow(${i},'${m.source}','${m.id.replace(/'/g,"\\'")}','${m.title.replace(/'/g,"\\'")}','${(m.cover||'').replace(/'/g,"\\'")}',${m.chapters||0})">${isFollowed?'✓ Following':'+ Follow'}</button><button class="btn btn-ghost" style="width:100%;padding:.4rem;font-size:.75rem;" onclick="event.stopPropagation();openManga(${i},'${srcType}')">View Details</button>`}
      </div>
    </div>`;
  }).join('')}</div>`;
  window._searchResults = data;
}

async function searchAll() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const btn = document.getElementById('search-all-btn');
  btn.classList.add('loading'); btn.textContent = 'Searching all…';
  document.getElementById('results-wrap').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted);"><div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 1rem;"></div><br>Searching all sources…</div>';
  const res = await fetch(`/api/search-all?q=${encodeURIComponent(q)}`);
  const data = await res.json();
  btn.classList.remove('loading'); btn.textContent = 'Search All';

  if (!data.length) {
    document.getElementById('results-wrap').innerHTML = '<div class="empty-search"><h3>No results</h3><p>No sources returned results. The external sites may be unavailable — try searching individual sources.</p></div>';
    return;
  }

  const grouped = {};
  data.forEach(m => {
    const src = m.source;
    if (!grouped[src]) grouped[src] = [];
    grouped[src].push(m);
  });

        const sourceNames = {
    mangadex:'MangaDex', mangafox:'MangaFox', anilist:'AniList',
    myanimelist:'MyAnimeList', mangal:'mangal'
  };
  let html = '';
  for (const [src, items] of Object.entries(grouped)) {
    const label = sourceNames[src] || src;
    html += `<div class="source-group">
      <div class="source-group-header">
        <span class="source-badge-sm ${src}">${label}</span>
        <span class="source-group-count">${items.length}</span>
      </div>
      <div class="results-grid">${items.map((m,i)=>{
        const coverUrl = m.cover ? (m.cover.includes('mangadex') ? m.cover.replace('.256.jpg', '.512.jpg') : m.cover) : '';
        const chInfo = m.chapters ? `<span class="ch-badge">${m.chapters} ch</span>` : '';
        const genres = (m.genres||[]).slice(0,2).map(g=>`<span class="genre-badge">${g}</span>`).join('');
        const isDownloadSource = ['mangadex','mangafox'].includes(m.source) || m.source.startsWith('mangal_');
        const isFollowed = window._followedIds && window._followedIds.includes(`${m.source}::${m.id}`);
        return `
        <div class="result-card" onclick="openManga(${i},'${src}')">
          <div class="result-cover"><img src="${coverUrl}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'"></div>
          <div class="result-info">
            <div class="result-title">${m.title}</div>
            <div class="result-meta">${m.status||'unknown'} ${chInfo}</div>
            <div class="result-genres">${genres}</div>
            ${isDownloadSource ? `<button class="btn btn-ghost" style="width:100%;padding:.4rem;font-size:.75rem;" onclick="event.stopPropagation();openManga(${i},'${src}')">View Details</button>` : `<button class="follow-btn${isFollowed?' following':''}" style="width:100%;margin-bottom:.3rem;" onclick="event.stopPropagation();toggleFollow(${i},'${m.source}','${m.id.replace(/'/g,"\\'")}','${m.title.replace(/'/g,"\\'")}','${(m.cover||'').replace(/'/g,"\\'")}',${m.chapters||0})">${isFollowed?'✓ Following':'+ Follow'}</button><button class="btn btn-ghost" style="width:100%;padding:.4rem;font-size:.75rem;" onclick="event.stopPropagation();openManga(${i},'${src}')">View Details</button>`}
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }
  document.getElementById('results-wrap').innerHTML = html;
  window._searchResults = data;
  window._groupedResults = grouped;
}

async function openManga(idx, sourceGroup) {
  if (sourceGroup && window._groupedResults) {
    currentResult = window._groupedResults[sourceGroup][idx];
  } else {
    currentResult = window._searchResults[idx];
  }
  document.getElementById('modal-title').textContent = currentResult.title;
  document.getElementById('modal-desc').textContent = currentResult.description || '';
  const coverUrl = currentResult.cover
    ? (currentResult.cover.includes('mangadex') ? currentResult.cover.replace('.256.jpg', '.512.jpg') : currentResult.cover)
    : '';
  document.getElementById('modal-img').src = coverUrl;
  document.getElementById('modal-status').textContent = currentResult.status || '';
  const isDownloadSource = ['mangadex','mangafox'].includes(currentResult.source);
  document.getElementById('dl-all-btn').style.display = isDownloadSource ? '' : 'none';

  if (isDownloadSource) {
    document.getElementById('chapter-section').style.display = '';
    document.getElementById('metadata-section').style.display = 'none';
    document.getElementById('chapter-count').textContent = 'Loading chapters…';
    document.getElementById('dl-all-btn').disabled = false;
    document.getElementById('dl-all-btn').textContent = '↓ Download All';
    document.getElementById('chapter-list').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Loading chapters…</div>';
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    const res = await fetch(`/api/manga-source/${currentResult.source}/${currentResult.id}/chapters`);
    const chapters = await res.json();
    if (!chapters.length) {
      document.getElementById('chapter-count').textContent = 'No chapters found';
      document.getElementById('chapter-list').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">No chapters found.</div>';
      document.getElementById('dl-all-btn').disabled = true;
      return;
    }
    document.getElementById('chapter-count').textContent = `${chapters.length} chapters`;
    window._currentChapters = chapters;
    const srcType = currentResult.source;
    document.getElementById('chapter-list').innerHTML = chapters.map(c=>`
      <div class="chapter-item" id="ch-${c.id}">
        <div class="ch-item-meta">
          <div class="ch-name">Chapter ${c.chapter} ${c.title && c.title !== `Chapter ${c.chapter}` ? '— '+c.title : ''}</div>
          <div class="ch-pages">${c.pages ? c.pages+' pages' : ''}</div>
        </div>
        <div style="display:flex;gap:.4rem;flex-shrink:0;">
          <button class="dl-btn" onclick="readChapter('${srcType}','${currentResult.id}','${c.id}','${c.chapter}')">📖 Read</button>
          <button class="dl-btn" onclick="downloadChapter('${c.id}','${c.chapter}')">↓ Download</button>
        </div>
      </div>`).join('');
  } else {
    document.getElementById('chapter-section').style.display = 'none';
    document.getElementById('metadata-section').style.display = '';
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    const sourceUrls = {anilist:'https://anilist.co/manga/', myanimelist:'https://myanimelist.net/manga/'};
    document.getElementById('meta-source-link').href = `${sourceUrls[currentResult.source]||''}${currentResult.id}`;
    const res = await fetch(`/api/manga-source/${currentResult.source}/${currentResult.id}/chapters`);
    const info = await res.json();
    if (info.length && info[0].metadata) {
      const md = info[0].metadata;
      document.getElementById('metadata-body').innerHTML = `
        ${md.score ? `<div class="meta-row"><span class="meta-label">Score</span><span class="meta-val">${md.score} (${md.scored_by?.toLocaleString()} users)</span></div>` : ''}
        ${md.rank ? `<div class="meta-row"><span class="meta-label">Rank</span><span class="meta-val">#${md.rank}</span></div>` : ''}
        ${md.popularity ? `<div class="meta-row"><span class="meta-label">Popularity</span><span class="meta-val">#${md.popularity}</span></div>` : ''}
        ${md.members ? `<div class="meta-row"><span class="meta-label">Members</span><span class="meta-val">${md.members.toLocaleString()}</span></div>` : ''}
        ${md.volumes ? `<div class="meta-row"><span class="meta-label">Volumes</span><span class="meta-val">${md.volumes}</span></div>` : ''}
        ${md.chapters ? `<div class="meta-row"><span class="meta-label">Chapters</span><span class="meta-val">${md.chapters}</span></div>` : ''}
        ${md.status ? `<div class="meta-row"><span class="meta-label">Status</span><span class="meta-val">${md.status}</span></div>` : ''}
        ${md.published ? `<div class="meta-row"><span class="meta-label">Published</span><span class="meta-val">${md.published}</span></div>` : ''}
        ${md.authors?.length ? `<div class="meta-row"><span class="meta-label">Authors</span><span class="meta-val">${md.authors.join(', ')}</span></div>` : ''}
        ${md.genres?.length ? `<div class="meta-row"><span class="meta-label">Genres</span><span class="meta-val">${md.genres.join(', ')}</span></div>` : ''}
        ${md.themes?.length ? `<div class="meta-row"><span class="meta-label">Themes</span><span class="meta-val">${md.themes.join(', ')}</span></div>` : ''}
        ${md.serialization?.length ? `<div class="meta-row"><span class="meta-label">Serialization</span><span class="meta-val">${md.serialization.join(', ')}</span></div>` : ''}
      `;
    } else {
      document.getElementById('metadata-body').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">No metadata available.</div>';
    }
  }
}

function readChapter(source, mangaId, chId, chNum) {
  const title = encodeURIComponent(currentResult.title);
  window.open(`/read-source/${source}/${mangaId}/${chId}?title=${title}`, '_blank');
}

async function downloadChapter(chId, chNum) {
  const btn = document.querySelector(`#ch-${chId} .dl-btn`);
  btn.textContent = '…'; btn.className = 'dl-btn loading';
  const fmt = document.getElementById('format-sel')?.value || 'cbz';
  const res = await fetch('/api/download', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({chapter_id:chId, manga_title:currentResult.title, chapter_num:chNum, source:currentResult.source, output_format:fmt})
  });
  const {job_id} = await res.json();
  pollDownload(job_id, btn);
}

async function downloadAll() {
  const btn = document.getElementById('dl-all-btn');
  btn.disabled = true; btn.textContent = '⏳ Queuing…';
  const fmt = document.getElementById('format-sel')?.value || 'cbz';
  const res = await fetch('/api/download-all', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({chapter_id: currentResult.id, manga_title: currentResult.title, chapter_num: '', source: currentResult.source, output_format:fmt})
  });
  const data = await res.json();
  btn.textContent = `↓ Queued ${data.total} chapters`;
  setTimeout(() => { btn.textContent = '↓ Download All'; btn.disabled = false; }, 5000);
  const btns = document.querySelectorAll('.chapter-item .dl-btn');
  btns.forEach(b => { b.textContent = '⏳ Queued'; b.className = 'dl-btn loading'; });
  data.job_ids.forEach((jobId, i) => {
    const b = btns[i];
    if (b) pollDownload(jobId, b);
  });
}

async function pollDownload(jobId, btn) {
  const res = await fetch(`/api/download/${jobId}`);
  const d = await res.json();
  if (d.status === 'downloading') {
    btn.textContent = d.progress + '%';
    setTimeout(() => pollDownload(jobId, btn), 800);
  } else if (d.status === 'complete') {
    btn.textContent = '✓ Done'; btn.className = 'dl-btn done';
  } else {
    btn.textContent = '✗ Error'; btn.style.background = '#5c2a2a';
    setTimeout(() => pollDownload(jobId, btn), 2000);
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

async function loadFollowed() {
  try {
    const res = await fetch('/api/followed');
    const data = await res.json();
    window._followedIds = data.map(f => `${f.source}::${f.source_id}`);
    window._followedMap = {};
    data.forEach(f => { window._followedMap[`${f.source}::${f.source_id}`] = f.id; });
  } catch (e) { console.error('Failed to load followed:', e); }
}

async function toggleFollow(idx, source, sourceId, title, cover, chapters) {
  const key = `${source}::${sourceId}`;
  const isFollowed = window._followedIds && window._followedIds.includes(key);
  if (isFollowed) {
    const followId = window._followedMap[key];
    const res = await fetch(`/api/unfollow/${followId}`, { method: 'POST' });
    if (res.ok) {
      window._followedIds = window._followedIds.filter(k => k !== key);
      delete window._followedMap[key];
    }
  } else {
    const res = await fetch('/api/follow', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, source_id: sourceId, title, cover, chapters })
    });
    if (res.ok) {
      if (!window._followedIds) window._followedIds = [];
      window._followedIds.push(key);
      const followedRes = await fetch('/api/followed');
      const followedData = await followedRes.json();
      const newItem = followedData.find(f => f.source === source && f.source_id === sourceId);
      if (newItem) window._followedMap[key] = newItem.id;
    }
  }
  const btns = document.querySelectorAll('.follow-btn');
  btns.forEach(btn => {
    const onclick = btn.getAttribute('onclick');
    if (onclick && onclick.includes(`'${source}'`) && onclick.includes(`'${sourceId}'`)) {
      const nowFollowed = window._followedIds.includes(key);
      btn.className = `follow-btn${nowFollowed ? ' following' : ''}`;
      btn.textContent = nowFollowed ? '✓ Following' : '+ Follow';
    }
  });
}

loadFollowed();
loadSources();
</script>
</body>
</html>

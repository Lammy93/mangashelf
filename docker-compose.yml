services:
  mangashelf:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/lammy93/mangashelf:latest
    container_name: mangashelf
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8035}:8080"
    volumes:
      - "${MANGA_DIR:-./manga}:/manga"
      - "${DATA_DIR:-./data}:/data"
    environment:
      - TZ=${TZ:-Australia/Brisbane}
      - SECRET_KEY=${SECRET_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEMORY_LIMIT:-1G}"
        reservations:
          cpus: "${CPU_RESERVATION:-0.5}"
          memory: "${MEMORY_RESERVATION:-256M}"
    networks:
      - mangashelf-net

networks:
  mangashelf-net:
    driver: bridge

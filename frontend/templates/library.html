<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Manga — MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

{% include '_sidebar.html' %}

<div id="main">
  <div class="top-bar">
    <button id="menu-btn" onclick="openMobileSidebar()">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="top-bar-title">All Manga</div>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search manga…" oninput="filterLibrary(this.value)">
    </div>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title">All Manga</div>
      <span id="count-label" class="count-label"></span>
    </div>
    <div class="grid" id="manga-grid"></div>
    <div id="empty-state" style="display:none;">
      <h2>No manga yet</h2>
      <p>Drop files in your manga folder or use Discover to add new manga.</p><br>
      <a href="/search" class="btn btn-primary">Browse Sources</a>
    </div>
  </div>
</div>

<div id="edit-overlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Edit Metadata</h2>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div id="edit-form" class="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
    </div>
    <div id="edit-status" class="modal-status"></div>
  </div>
</div>

<script>
let editMangaId = null;
let editOriginal = null;
let allManga = [];

(function() {
  const collapsed = localStorage.getItem('sidebarCollapsed') === 'true';
  if (collapsed) {
    document.getElementById('sidebar').classList.add('collapsed');
    document.getElementById('main').classList.add('expanded');
  }
})();

async function loadLibrary(q = '') {
  const res = await fetch(`/api/library?q=${encodeURIComponent(q)}`);
  allManga = await res.json();
  document.getElementById('count-label').textContent = `${allManga.length} titles`;
  const grid = document.getElementById('manga-grid');
  const empty = document.getElementById('empty-state');
  if (!allManga.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = allManga.map(m => renderCard(m)).join('');
}
function renderCard(m) {
  const dc = m.downloaded_chapters ?? 0;
  const cover = m.cover
    ? `<img src="${m.cover}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="no-cover">📖</div>`;
  const isFav = window._favoriteIds && window._favoriteIds.has(m.id);
  const favIcon = isFav
    ? '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>'
    : '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>';
  return `<div class="card" onclick="window.location='/manga/${m.slug || m.id}'">
    <div class="card-cover">${cover}
      <button class="card-fav${isFav ? ' favorited' : ''}" onclick="event.stopPropagation();toggleFav('${m.id}', this)" title="Toggle favorite">${favIcon}</button>
      <button class="card-edit" onclick="event.stopPropagation();openEditModal('${m.id}')" title="Edit metadata">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      </button>
    </div>
    <div class="card-info">
      <div class="card-title">${m.title}</div>
      <div class="card-meta">${dc} ch</div>
    </div>
  </div>`;
}
function filterLibrary(q) { loadLibrary(q); }
async function toggleFav(mangaId, btn) {
  const res = await fetch(`/api/manga/${mangaId}/favorite`, {method:'POST'});
  const data = await res.json();
  const filled = '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>';
  const outline = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>';
  if (data.favorited) {
    window._favoriteIds.add(mangaId);
    btn.className = 'card-fav favorited';
    btn.innerHTML = filled;
  } else {
    window._favoriteIds.delete(mangaId);
    btn.className = 'card-fav';
    btn.innerHTML = outline;
  }
}
async function loadFavoriteIds() {
  try {
    const res = await fetch('/api/favorites');
    const data = await res.json();
    window._favoriteIds = new Set(data.map(m => m.id));
  } catch (e) { window._favoriteIds = new Set(); }
}
async function openEditModal(mangaId) {
  editMangaId = mangaId;
  const res = await fetch(`/api/manga/${mangaId}/nfo`);
  editOriginal = await res.json();
  const fields = [
    {key:'title',label:'Title',type:'text'},{key:'author',label:'Author',type:'text'},{key:'artist',label:'Artist',type:'text'},
    {key:'genre',label:'Genre',type:'text'},{key:'status',label:'Status',type:'select',options:['','Publishing','Completed','On Hiatus','Cancelled']},
    {key:'publisher',label:'Publisher',type:'text'},{key:'year',label:'Year',type:'number'},{key:'total_chapters',label:'Total Chapters',type:'number'},
    {key:'cover',label:'Cover URL',type:'text'},{key:'summary',label:'Summary',type:'textarea'}
  ];
  document.getElementById('edit-form').innerHTML = fields.map(f => {
    const val = editOriginal[f.key] || '';
    if (f.type === 'select') return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label><select class="field" data-key="${f.key}">${f.options.map(o=>`<option value="${o}"${o==val?' selected':''}>${o||'—'}</option>`).join('')}</select></div>`;
    if (f.type === 'textarea') return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label><textarea class="field" data-key="${f.key}" rows="3" style="resize:vertical;">${val}</textarea></div>`;
    return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label><input class="field" type="${f.type}" data-key="${f.key}" value="${val}"></div>`;
  }).join('');
  document.getElementById('edit-overlay').style.display = 'flex';
}
function closeEditModal() { document.getElementById('edit-overlay').style.display = 'none'; editMangaId = null; }
async function saveEdit() {
  const form = document.getElementById('edit-form');
  const data = {};
  form.querySelectorAll('[data-key]').forEach(el => { let v = el.value; const k = el.dataset.key; if (k === 'year' && v) v = parseInt(v); if (k === 'total_chapters' && v) v = parseInt(v); data[k] = v || null; });
  document.getElementById('edit-status').textContent = 'Saving…';
  const res = await fetch(`/api/manga/${editMangaId}/nfo`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  const result = await res.json();
  if (result.ok) { document.getElementById('edit-status').className = 'modal-status text-success'; document.getElementById('edit-status').textContent = '✓ Saved'; closeEditModal(); loadLibrary(); }
  else { document.getElementById('edit-status').className = 'modal-status text-error'; document.getElementById('edit-status').textContent = 'Save failed'; }
}
loadFavoriteIds().then(loadLibrary);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
  .hero{display:flex;gap:2rem;padding:0;flex-wrap:wrap;}
  .hero-cover{width:200px;flex-shrink:0;aspect-ratio:2/3;border-radius:12px;overflow:hidden;background:var(--surface2);position:relative;}
  .hero-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .hero-cover .no-cover{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;color:var(--border);}
  .hero-info{flex:1;min-width:240px;}
  .hero-title{font-family:'Dela Gothic One',sans-serif;font-size:1.8rem;line-height:1.2;margin-bottom:.5rem;}
  .hero-meta{color:var(--muted);font-size:.875rem;margin-bottom:1rem;display:flex;gap:1rem;flex-wrap:wrap;}
  .hero-desc{font-size:.875rem;color:var(--muted);line-height:1.6;margin-bottom:1.25rem;max-width:600px;}
  .hero-actions{display:flex;gap:.75rem;flex-wrap:wrap;}
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-top:.5rem;}
  .tab{padding:.75rem 1.25rem;font-size:.875rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);}
  .tab-content{padding:1.5rem 0;display:none;}
  .tab-content.active{display:block;}
  .vol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .vol-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s;}
  .vol-card:hover{border-color:var(--accent);}
  .vol-card.active-vol{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,64,58,.2);}
  .vol-cover{aspect-ratio:2/3;background:var(--surface2);overflow:hidden;}
  .vol-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .vol-info{padding:.6rem;}
  .vol-title{font-size:.78rem;font-weight:600;}
  .vol-meta{font-size:.7rem;color:var(--muted);}
  .chapter-list{display:flex;flex-direction:column;gap:.4rem;}
  .chapter-item{display:flex;align-items:center;justify-content:space-between;padding:.65rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .2s;text-decoration:none;color:inherit;}
  .chapter-item:hover{border-color:var(--accent);}
  .chapter-item.is-read{opacity:.5;}
  .ch-left{display:flex;align-items:center;gap:.75rem;}
  .ch-num{font-size:.85rem;font-weight:700;min-width:60px;}
  .ch-title{font-size:.82rem;color:var(--muted);}
  .ch-right{display:flex;align-items:center;gap:.5rem;}
  .ch-pages{font-size:.72rem;color:var(--muted);}
  .ch-read-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .meta-search{padding:.5rem 0;}
  .meta-search-row{display:flex;gap:.75rem;margin-bottom:1.25rem;}
  .meta-search-row select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:.5rem .9rem;font-size:.85rem;font-family:inherit;outline:none;}
  .meta-result{display:flex;align-items:center;gap:1rem;padding:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:.5rem;}
  .meta-result img{width:50px;height:75px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--surface);}
  .meta-result-info{flex:1;min-width:0;}
  .meta-result-title{font-size:.85rem;font-weight:600;margin-bottom:.2rem;}
  .meta-result-meta{font-size:.72rem;color:var(--muted);}
  .meta-apply-btn{padding:.35rem .7rem;border-radius:5px;border:none;background:var(--accent);color:#fff;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .2s;}
  .meta-apply-btn:hover{background:#c93530;}
  .meta-apply-btn.applied{background:#2a5c2a;color:#7de87d;cursor:default;}
  .match-section{padding:0 1.25rem 1rem;border-bottom:1px solid var(--border);}
  .match-section .match-search-row{display:flex;gap:.5rem;margin-bottom:.75rem;}
  .match-section .match-search-row input{flex:1;}
  .match-results{display:flex;flex-direction:column;gap:.4rem;max-height:200px;overflow-y:auto;}
  .match-result{display:flex;align-items:center;gap:.65rem;padding:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
  .match-result img{width:36px;height:54px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--surface);}
  .match-result-info{flex:1;min-width:0;}
  .match-result-title{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .match-result-meta{font-size:.68rem;color:var(--muted);}
  .match-apply-btn{padding:.3rem .6rem;border-radius:5px;border:none;font-size:.7rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s;}
  .match-apply-btn.primary{background:var(--accent);color:#fff;}
  .match-apply-btn.primary:hover{background:#c93530;}
  .match-apply-btn.applied{background:#2a5c2a;color:#7de87d;cursor:default;}
  .match-apply-btn.loading{background:var(--surface);color:var(--muted);cursor:default;}
</style>
</head>
<body>

{% include '_sidebar.html' %}

<div id="main">
  <div class="top-bar">
    <button id="menu-btn" onclick="openMobileSidebar()">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="top-bar-title"><a href="/" style="color:var(--text);text-decoration:none;">← Back to Library</a></div>
  </div>
  <div class="content">
    <div id="hero-wrap"></div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('volumes')">Volumes</div>
      <div class="tab" onclick="switchTab('chapters')">All Chapters</div>
    </div>

    <div class="tab-content active" id="tab-volumes">
      <div class="vol-grid" id="vol-grid"></div>
      <div class="chapter-list" id="vol-chapters"></div>
    </div>
    <div class="tab-content" id="tab-chapters">
      <div class="chapter-list" id="all-chapters"></div>
    </div>
  </div>
</div>

<div id="edit-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:520px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);">
      <h3 style="font-family:'Dela Gothic One',sans-serif;font-size:1rem;">Edit Details</h3>
      <button onclick="closeEditModal()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;">✕</button>
    </div>
    <div class="match-section">
      <label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.4rem;font-weight:600;">Find Match from Online Sources</label>
      <div class="match-search-row">
        <input class="field" type="text" id="match-search-input" placeholder="Search title…">
        <button class="btn btn-ghost" onclick="searchMatch()" style="padding:.5rem .8rem;flex-shrink:0;">Search</button>
      </div>
      <div id="match-results" class="match-results" style="display:none;"></div>
      <div id="match-status" style="font-size:.72rem;color:var(--muted);margin-top:.3rem;"></div>
    </div>
    <div id="edit-form" style="padding:1.25rem;overflow-y:auto;display:flex;flex-direction:column;gap:.75rem;"></div>
    <div style="display:flex;gap:.75rem;padding:1rem 1.25rem;border-top:1px solid var(--border);">
      <button class="btn btn-primary" onclick="saveEdit()" style="flex:1;">Save</button>
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
    </div>
    <div id="edit-status" style="padding:0 1.25rem .75rem;font-size:.8rem;color:var(--muted);"></div>
  </div>
</div>

<script>
const MANGA_ID = "{{ manga_id }}";
const MANGA_SLUG = "{{ slug }}";
let data = null;
let activeVol = null;

async function load() {
  const res = await fetch(`/api/manga/${MANGA_ID}`);
  data = await res.json();
  renderHero();
  renderVolumes();
  renderAllChapters();

  if (data.volumes.length) {
    selectVolume(data.volumes[0].id);
  } else {
    document.querySelector('.tab[onclick*="volumes"]').textContent = 'Chapters';
    renderVolChapters(null);
  }
  if (!data.manga.author || !data.manga.genre || !data.manga.summary) {
    autoFetchMetadataIfMissing();
  }
}

function renderHero() {
  const m = data.manga;
  const cover = m.cover
    ? `<img src="${m.cover}" alt="${m.title}">`
    : `<div class="no-cover">📖</div>`;
  document.getElementById('hero-wrap').innerHTML = `
    <div class="hero">
      <div class="hero-cover">${cover}</div>
      <div class="hero-info">
        <div class="hero-title">${m.title}</div>
        <div class="hero-meta">
          ${m.author ? `<span>By ${m.author}</span>` : ''}
          ${m.year ? `<span>(${m.year})</span>` : ''}
          ${m.publisher ? `<span>${m.publisher}</span>` : ''}
          ${data.chapters.length ? `<span class="badge badge-vol">${data.chapters.length} Chapters</span>` : ''}
          ${m.status ? `<span class="badge badge-status">${m.status}</span>` : ''}
        </div>
        ${m.genre ? `<div style="margin-bottom:.5rem;"><span class="badge badge-vol">${m.genre}</span></div>` : ''}
        ${m.summary ? `<div class="hero-desc">${m.summary}</div>` : ''}
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="readFirst()">▶ Read First</button>
          <button class="btn btn-ghost" onclick="openEditModal()">✎ Edit</button>
        </div>
      </div>
    </div>`;
}

function renderVolumes() {
  if (!data.volumes.length) { document.getElementById('vol-grid').innerHTML = ''; return; }
  document.getElementById('vol-grid').innerHTML = data.volumes.map(v => `
    <div class="vol-card" id="vol-${v.id}" onclick="selectVolume('${v.id}')">
      <div class="vol-cover">
        ${v.cover ? `<img src="${v.cover}" alt="${v.title}">` : '<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--border);">📚</div>'}
      </div>
      <div class="vol-info">
        <div class="vol-title">Vol.${v.volume_number}</div>
        <div class="vol-meta">${v.title || ''}</div>
      </div>
    </div>`).join('');
}

function selectVolume(volId) {
  activeVol = volId;
  document.querySelectorAll('.vol-card').forEach(c => c.classList.remove('active-vol'));
  const el = document.getElementById(`vol-${volId}`);
  if (el) el.classList.add('active-vol');
  renderVolChapters(volId);
}

function renderVolChapters(volId) {
  const chapters = volId
    ? data.chapters.filter(c => c.volume_id === volId)
    : data.chapters;
  document.getElementById('vol-chapters').innerHTML = chaptersHtml(chapters);
}

function renderAllChapters() {
  document.getElementById('all-chapters').innerHTML = chaptersHtml(data.chapters);
}

function chaptersHtml(chapters) {
  return chapters.map(c => {
    const prog = data.progress[c.id];
    const isRead = prog?.is_read;
    const readDot = prog && prog.page > 0 && !isRead ? '<div class="ch-read-dot"></div>' : '';
    return `<a class="chapter-item ${isRead ? 'is-read' : ''}" href="/read/${MANGA_SLUG}/${c.slug || c.id}">
      <div class="ch-left">
        <span class="ch-num">Ch.${c.chapter_number}</span>
        <span class="ch-title">${c.title || ''}</span>
      </div>
      <div class="ch-right">
        ${c.pages ? `<span class="ch-pages">${c.pages}p</span>` : ''}
        ${readDot}
        ${isRead ? '<span style="font-size:.7rem;color:var(--muted)">✓ Read</span>' : ''}
      </div>
    </a>`;
  }).join('');
}

function switchTab(tab) {
  const tabs = ['volumes', 'chapters'];
  const idx = tabs.indexOf(tab);
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-content').forEach((c,i) => c.classList.toggle('active', i === idx));
}

async function readFirst() {
  const first = data.chapters[0];
  if (first) window.location = `/read/${MANGA_SLUG}/${first.slug || first.id}`;
}

async function autoFetchMetadataIfMissing() {
  const res = await fetch(`/api/search-all?q=${encodeURIComponent(data.manga.title)}`);
  const results = await res.json();
  const anilist = results.find(r => r.source === 'anilist');
  const mal = results.find(r => r.source === 'myanimelist');
  const best = anilist || mal;
  if (!best) return;
  const source = best.source;
  const params = new URLSearchParams({source, external_id: best.id});
  if (best.cover) params.set('cover', best.cover);
  await fetch(`/api/manga/${MANGA_ID}/metadata?${params.toString()}`);
  const updated = await (await fetch(`/api/manga/${MANGA_ID}`)).json();
  data.manga = updated.manga;
  renderHero();
}

async function openEditModal() {
  const res = await fetch(`/api/manga/${MANGA_ID}/nfo`);
  const nfo = await res.json();
  const fields = [
    {key:'title',label:'Title',type:'text'},
    {key:'author',label:'Author',type:'text'},
    {key:'artist',label:'Artist',type:'text'},
    {key:'genre',label:'Genre',type:'text'},
    {key:'status',label:'Status',type:'select',options:['','Publishing','Completed','On Hiatus','Cancelled']},
    {key:'publisher',label:'Publisher',type:'text'},
    {key:'year',label:'Year',type:'number'},
    {key:'total_chapters',label:'Total Chapters',type:'number'},
    {key:'cover',label:'Cover URL',type:'text'},
    {key:'summary',label:'Summary',type:'textarea'}
  ];
  document.getElementById('edit-form').innerHTML = fields.map(f => {
    const val = nfo[f.key] || '';
    if (f.type === 'select') {
      return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label>
        <select class="field" data-key="${f.key}">${f.options.map(o=>`<option value="${o}"${o==val?' selected':''}>${o||'—'}</option>`).join('')}</select></div>`;
    }
    if (f.type === 'textarea') {
      return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label>
        <textarea class="field" data-key="${f.key}" rows="3" style="resize:vertical;">${val}</textarea></div>`;
    }
    return `<div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;">${f.label}</label>
      <input class="field" type="${f.type}" data-key="${f.key}" value="${val}"></div>`;
  }).join('');
  document.getElementById('match-search-input').value = data.manga.title;
  document.getElementById('match-results').style.display = 'none';
  document.getElementById('match-status').textContent = '';
  document.getElementById('edit-overlay').style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('edit-overlay').style.display = 'none';
}

async function saveEdit() {
  const form = document.getElementById('edit-form');
  const data = {};
  form.querySelectorAll('[data-key]').forEach(el => {
    let v = el.value;
    const k = el.dataset.key;
    if (k === 'year' && v) v = parseInt(v);
    if (k === 'total_chapters' && v) v = parseInt(v);
    data[k] = v || null;
  });
  document.getElementById('edit-status').textContent = 'Saving…';
  const res = await fetch(`/api/manga/${MANGA_ID}/nfo`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  const result = await res.json();
  if (result.ok) {
    document.getElementById('edit-status').style.color = '#7de87d';
    document.getElementById('edit-status').textContent = '✓ Saved';
    closeEditModal();
    setTimeout(load, 800);
  } else {
    document.getElementById('edit-status').style.color = 'var(--accent)';
    document.getElementById('edit-status').textContent = 'Save failed';
  }
}

async function searchMatch() {
  const q = document.getElementById('match-search-input').value.trim();
  if (!q) return;
  const statusEl = document.getElementById('match-status');
  const resultsEl = document.getElementById('match-results');
  statusEl.textContent = 'Searching…';
  resultsEl.style.display = 'none';
  const res = await fetch(`/api/search-all?q=${encodeURIComponent(q)}`);
  const data = await res.json();
  if (!data.length) {
    statusEl.textContent = 'No matches found. Try a different title.';
    return;
  }
  const sourceLabels = {mangadex: 'MangaDex', anilist: 'AniList', myanimelist: 'MyAnimeList'};
  const metadataSources = ['anilist', 'myanimelist'];
  resultsEl.innerHTML = data.map(r => {
    const label = sourceLabels[r.source] || r.source;
    const isMeta = metadataSources.includes(r.source);
    const coverUrl = r.cover || '';
    return `<div class="match-result">
      <img src="${coverUrl}" alt="" onerror="this.style.display='none'">
      <div class="match-result-info">
        <div class="match-result-title">${r.title}</div>
        <div class="match-result-meta">${label}${r.chapters ? ` · ${r.chapters}ch` : ''}${r.status ? ' · '+r.status : ''}</div>
      </div>
      <button class="match-apply-btn ${isMeta ? 'primary' : ''}" onclick="applyMatch('${r.source}','${r.id.replace(/'/g, "\\'")}','${(r.cover||'').replace(/'/g, "\\'")}','${(r.title||'').replace(/'/g, "\\'")}',this)">${isMeta ? 'Apply (Full)' : 'Apply (Cover)'}</button>
    </div>`;
  }).join('');
  statusEl.textContent = `${data.length} result(s) found. Click Apply to update metadata & cover.`;
  resultsEl.style.display = 'flex';
}

async function applyMatch(source, externalId, cover, title, btn) {
  btn.className = 'match-apply-btn loading';
  btn.textContent = 'Applying…';
  const body = {source, external_id: externalId};
  if (cover) body.cover_url = cover;
  if (title) body.title = title;
  try {
    const res = await fetch(`/api/manga/${MANGA_ID}/rematch`, {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
    });
    const result = await res.json();
    if (result.ok) {
      btn.className = 'match-apply-btn applied';
      btn.textContent = '✓ Applied';
      document.querySelectorAll('.match-apply-btn:not(.applied)').forEach(b => { b.disabled = true; });
      document.getElementById('match-status').textContent = '✓ Match applied! Metadata & cover updated.';
      const updated = await (await fetch(`/api/manga/${MANGA_ID}`)).json();
      data = updated;
      renderHero();
      renderVolumes();
      renderAllChapters();
      document.getElementById('match-search-input').value = result.title || title;
    } else {
      btn.className = 'match-apply-btn primary';
      btn.textContent = 'Failed';
      document.getElementById('match-status').textContent = 'Apply failed.';
    }
  } catch (e) {
    btn.className = 'match-apply-btn primary';
    btn.textContent = 'Error';
    document.getElementById('match-status').textContent = 'Network error.';
  }
}

load();
</script>
</body>
</html>

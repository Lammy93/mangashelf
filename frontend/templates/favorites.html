<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/img/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites — MangaShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

{% include '_sidebar.html' %}

<div id="main">
  <div class="top-bar">
    <button id="menu-btn" onclick="openMobileSidebar()">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="top-bar-title">Favorites</div>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title">❤️ Favorites</div>
      <span id="count-label" class="count-label"></span>
    </div>
    <div class="grid" id="fav-grid"></div>
    <div id="empty-state" style="display:none;">
      <h2>No favorites yet</h2>
      <p>Heart a manga from the library to add it here.</p>
    </div>
  </div>
</div>

<script>
(function() {
  const collapsed = localStorage.getItem('sidebarCollapsed') === 'true';
  if (collapsed) {
    document.getElementById('sidebar').classList.add('collapsed');
    document.getElementById('main').classList.add('expanded');
  }
})();

async function loadFavorites() {
  const res = await fetch('/api/favorites');
  const favs = await res.json();
  document.getElementById('count-label').textContent = `${favs.length} titles`;
  const grid = document.getElementById('fav-grid');
  const empty = document.getElementById('empty-state');
  if (!favs.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = favs.map(m => {
    const dc = m.downloaded_chapters ?? 0;
    const cover = m.cover ? `<img src="${m.cover}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'">` : `<div class="no-cover">📖</div>`;
    return `<div class="card" onclick="window.location='/manga/${m.slug || m.id}'">
      <div class="card-cover">${cover}
        <button class="fav-heart" onclick="event.stopPropagation();removeFavorite('${m.id}')" title="Remove from favorites">
          <svg fill="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        </button>
      </div>
      <div class="card-info">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">${dc} ch</div>
      </div>
    </div>`;
  }).join('');
}
async function removeFavorite(mangaId) {
  await fetch(`/api/manga/${mangaId}/favorite`, {method:'POST'});
  loadFavorites();
}
loadFavorites();
</script>
</body>
</html>
